    html.auth-checking, html.auth-checking body{visibility:hidden}

    header{padding:14px 16px;border-bottom:1px solid rgba(148,163,184,.25);display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap}
    .wrap{max-width:980px;margin:0 auto;padding:16px}

/* ===== Netflix-like cards ===== */
.hero{
  background: linear-gradient(120deg, rgba(0,0,0,.55), rgba(0,0,0,.85)), radial-gradient(circle at 20% 10%, rgba(34,197,94,.25), transparent 50%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px;
  padding: 18px 16px;
  margin-bottom: 16px;
}
.hero h1{margin:0 0 6px;font-size:20px}
.hero p{margin:0;color:rgba(255,255,255,.78);font-size:13px}
.rows{display:flex;flex-direction:column;gap:14px}
.row-title{display:flex;align-items:end;justify-content:space-between;margin:4px 0 8px}
.row-title h2{margin:0;font-size:16px}
.scroller{
  display:flex;
  gap:12px;
  overflow:auto;
  padding-bottom: 6px;
  scroll-snap-type:x mandatory;
  -webkit-overflow-scrolling: touch;
}
.course-card{
  scroll-snap-align:start;
  min-width: 230px;
  max-width: 260px;
  flex: 0 0 auto;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px;
  overflow:hidden;
  text-decoration:none;
  color:inherit;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.course-card:hover{
  transform: translateY(-2px);
  border-color: rgba(34,197,94,.35);
  box-shadow: 0 14px 30px rgba(0,0,0,.35);
}
.course-thumb{
  position:relative;
  aspect-ratio: 16/9;
  background: rgba(0,0,0,.4);
}
.course-thumb img{
  width:100%;
  height:100%;
  object-fit: cover;
  display:block;
}
.course-badge{
  position:absolute;left:10px;top:10px;
  background: rgba(0,0,0,.55);
  border: 1px solid rgba(255,255,255,.12);
  backdrop-filter: blur(10px);
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 12px;
}
.course-meta{
  padding: 12px 12px 14px;
}
.course-meta .title{
  font-weight:700;
  line-height:1.2;
  margin:0 0 6px;
  font-size:14px;
}
.course-meta .sub{
  margin:0;
  font-size:12px;
  color: rgba(255,255,255,.72);
}
@media (max-width: 520px){
  .course-card{min-width: 78vw; max-width: 84vw;}
}


/* ===== User dropdown ===== */
.user-menu{position:relative}
.user-trigger{
  display:inline-flex;align-items:center;gap:8px;
  padding:10px 12px;border-radius:12px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  color:inherit;font-weight:900;cursor:pointer;
}
.user-trigger:hover{border-color:rgba(255,255,255,.28)}
.avatar{display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;
  border-radius:999px;background:rgba(56,189,248,.18);border:1px solid rgba(56,189,248,.30)}
.caret{opacity:.85}
.user-dropdown{z-index:50;
  position:absolute;right:0;top:calc(100% + 10px);
  min-width:220px;
  border:1px solid rgba(148,163,184,.22);
  background:rgba(15,23,42,.96);
  backdrop-filter: blur(10px);
  border-radius:14px;
  box-shadow:0 24px 60px rgba(0,0,0,.45);
  padding:8px;
  display:none;
}
.user-dropdown.open{display:block}
.dd-item{
  width:100%;
  display:flex;align-items:center;gap:10px;
  padding:10px 10px;border-radius:12px;
  text-decoration:none;
  border:0;background:transparent;color:inherit;
  font-weight:900;cursor:pointer;text-align:left;
}
.dd-item:hover{background:rgba(255,255,255,.06)}
.dd-sep{height:1px;background:rgba(148,163,184,.18);margin:6px 4px}
.dd-item.danger{color:#fecaca}

/* ===== Udemy-like cards ===== */
.hero{
  background: linear-gradient(120deg, rgba(0,0,0,.55), rgba(0,0,0,.85)), radial-gradient(circle at 20% 10%, rgba(56,189,248,.20), transparent 50%);
  border: 1px solid rgba(255,255,255,.08);
  border-radius: 18px;
  padding: 18px 16px;
  margin-bottom: 16px;
}
.hero h1{margin:0 0 6px;font-size:20px}
.hero p{margin:0;color:rgba(255,255,255,.78);font-size:13px}

.course-grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
  gap:12px;
  justify-items:center;
}
.course{
  display:flex;flex-direction:column;
  width:100%;
  max-width: 320px;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.10);
  border-radius: 18px;
  overflow:hidden;
  text-decoration:none;color:inherit;
  transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
}
.course:hover{
  transform: translateY(-2px);
  border-color: rgba(56,189,248,.35);
  box-shadow: 0 14px 30px rgba(0,0,0,.35);
}
.course-cover{aspect-ratio: 16/9; background: rgba(0,0,0,.35); position:relative}
.course-cover img{width:100%;height:100%;object-fit:cover;display:block}
.course-body{padding:10px 10px 12px}
.course-title{margin:0 0 6px;font-weight:1000;font-size:13.5px;line-height:1.25}
.course-sub{margin:0 0 8px;font-size:12px;color:rgba(255,255,255,.72)}
.course-meta{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:6px}
.pill{
  padding:6px 10px;border-radius:999px;
  border:1px solid rgba(255,255,255,.12);
  background:rgba(255,255,255,.06);
  white-space:nowrap;
  font-weight:900;font-size:12px;
}
.progress{
  margin-top:8px;
  height:8px;border-radius:999px;
  background: rgba(255,255,255,.10);
  overflow:hidden;border:1px solid rgba(255,255,255,.08);
}
.progress > div{height:100%;width:20% ;background: rgba(34,197,94,.75);} /* default */


@media (max-width: 520px){
  .course{max-width: none;}
  .course-grid{grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));}
}

<script>
document.documentElement.classList.add("auth-checking");
(function () {
  
  function readCourseProgress(courseId, apiProgress){
    try{
      const p = JSON.parse(localStorage.getItem("pasir_progress_" + courseId) || "{}");
      const completed = Array.isArray(p.completed) ? p.completed.length : 0;
      const total = Number(p.totalModules || 0);
      const localPercent = total > 0 ? Math.round((completed / total) * 100) : 0;
      const percent = total > 0 ? localPercent : (Number.isFinite(apiProgress) ? apiProgress : 0);
      return { percent, completed, total };
    }catch(e){
      return { percent: Number.isFinite(apiProgress) ? apiProgress : 0, completed: 0, total: 0 };

  }

  function continueHref(courseId){

const token = localStorage.getItem("pasir_token");

<body data-theme="light">

  <div class="wrap">

<script>
function escapeHtml_(s){
  return String(s||"").replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

  const API_URL = "https://script.google.com/macros/s/AKfycby7goi8hJ06WF9up9NhPPXJn7a7z0dxrpzo-q37lNoAj9Ai07p5rMl7yGNliOYsdmlc/exec";

  function jsonp(action, payload) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const params = new URLSearchParams();
      params.set("action", action);
      Object.entries(payload || {}).forEach(([k,v]) => {
        if (v === undefined || v === null) return;
        params.set(k, String(v));
      });
      params.set("callback", cb);

      const script = document.createElement("script");
      script.src = API_URL + "?" + params.toString();
      script.async = true;

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        try { delete window[cb]; } catch(e) { window[cb] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = () => {
        cleanup();
        reject(new Error("No se pudo conectar (JSONP)."));
      };

      document.body.appendChild(script);
    });
  }

  function loadCourseProgress(courseId){
    try{
      return JSON.parse(localStorage.getItem("pasir_progress_" + courseId) || "{}");
    }catch(e){
      return {};
    }
  }

  function getCourseProgress(courseId, apiProgress){
    const p = loadCourseProgress(courseId);
    const completed = Array.isArray(p.completed) ? p.completed.length : 0;
    const total = Number(p.totalModules || 0);
    const localPercent = total > 0 ? Math.round((completed / total) * 100) : 0;
    const percent = localPercent > 0 ? localPercent : (Number.isFinite(apiProgress) ? apiProgress : 0);
    return { percent, completed, total };
  }

  function continueHref(courseId){
    return "course.html?courseId=" + encodeURIComponent(courseId);
  }
  window.getCourseProgress = getCourseProgress;


  const token = localStorage.getItem("pasir_token");
  if (!token) location.replace("login.html");
  (async () => {
    try {
      const r = await jsonp("me", { token });
      if (!r.ok) {
        localStorage.removeItem("pasir_token");
        return location.replace("login.html");
      }

      const status = document.getElementById("status");
      const list = document.getElementById("list");

      if (!r.courses || r.courses.length === 0) {
        status.textContent = "Aún no tienes cursos habilitados. Si ya pagaste, espera a que lo active por WhatsApp.";
        list.innerHTML = "";
        return;
      }

      
      status.textContent = "";

      // Opcional: mapea imágenes locales por courseId.
      // Sube tus portadas a /assets/courses/ (en tu repo) con el nombre del courseId:
      // assets/courses/logo8-basico.jpg
      const COURSE_IMAGES = {
        // "logo8-basico": "assets/courses/logo8-basico.jpg",
      };

      
const cards = r.courses.map(c => {
  const img =
    c.imageUrl ||
    COURSE_IMAGES[c.courseId] ||
    `assets/courses/${encodeURIComponent(c.courseId)}.jpg`;

  const pRaw = (c.progress ?? c.progreso);
  const pNum = (typeof pRaw === "number") ? pRaw : (typeof pRaw === "string" ? parseFloat(pRaw) : NaN);
  const apiProgress = Number.isFinite(pNum) ? Math.max(0, Math.min(100, pNum)) : 0;
  const saved = getCourseProgress(c.courseId, apiProgress);
  const progress = saved.percent;
  const continueText = progress > 0 ? "Continuar donde lo dejaste" : "Empezar curso";

  return `
    <div class="course" aria-label="${escapeHtml_(c.title)}">
      <a class="course-cover" href="${continueHref(c.courseId)}">
        <img src="${img}" alt="${escapeHtml_(c.title)}"
          onerror="this.onerror=null;this.src='icons/icon-512.png';" />
      </a>
      <div class="course-body">
        <p class="course-title">${escapeHtml_(c.title)}</p>
        <p class="course-sub">${escapeHtml_(c.courseId)}</p>
        <div class="progress" aria-label="Progreso"><div style="width:${progress}%"></div></div>
        <div class="progress-meta">
          <span>${progress}% completado</span>
          <span>${saved.total ? `${saved.completed}/${saved.total} módulos` : (progress > 0 ? "En progreso" : "Sin iniciar")}</span>
        </div>
        <div class="course-actions">
          <a class="btn-continue" href="${continueHref(c.courseId)}">${continueText}</a>
          <span class="pill">${progress}%</span>
        </div>
      </div>
    </div>
  `;
}).join("");

list.innerHTML = cards;
} catch (e) {
      document.getElementById("status").innerHTML = '<div class="err">'+(e.message || e)+'</div>';
    }
  })();
</script>


<script>
(function(){
  const token = localStorage.getItem("pasir_token");
  const userMenu = document.getElementById("userMenu");
  const userTrigger = document.getElementById("userTrigger");
  const userDropdown = document.getElementById("userDropdown");
  const userNameEl = document.getElementById("userName");

  function closeMenu(){
    if (!userDropdown) return;
    userDropdown.classList.remove("open");
    if (userTrigger) userTrigger.setAttribute("aria-expanded","false");
  }
  function openMenu(){
    if (!userDropdown) return;
    userDropdown.classList.add("open");
    if (userTrigger) userTrigger.setAttribute("aria-expanded","true");
  }
  if (userTrigger && userDropdown){
    userTrigger.addEventListener("click", (e)=>{
      e.stopPropagation();
      userDropdown.classList.contains("open") ? closeMenu() : openMenu();
    });
    document.addEventListener("click", ()=> closeMenu());
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeMenu(); });
    userDropdown.addEventListener("click", (e)=> e.stopPropagation());
  }

  if (token && userMenu) userMenu.style.display = "inline-block";

  async function hydrateUser(){
    const storedName = localStorage.getItem("pasir_email") || localStorage.getItem("pasir_name");
    if (storedName && userNameEl) userNameEl.textContent = storedName;

    if (!token) return;
    try{
      const r = await jsonp("me", { token });
      if (!r.ok) return;
      const email = (r.user && (r.user.email || r.user.correo)) || r.email || localStorage.getItem("pasir_email") || "";

      if (email && userNameEl) userNameEl.textContent = email;
      if (email) localStorage.setItem("pasir_email", email);
      if (userMenu) userMenu.style.display = "inline-block";
    }catch(e){}
  }
  hydrateUser();

  const logoutBtn = document.getElementById("logout");
  if (logoutBtn){
    logoutBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      localStorage.removeItem("pasir_token");
      localStorage.removeItem("pasir_name");
      localStorage.removeItem("pasir_email");
      localStorage.removeItem("pasir_name");
      location.replace("index.html");
    });
  }
})();
</script>
