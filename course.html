<script>
/* ===== YouTube IFrame Player API (sin UI de YouTube) + controles propios ===== */
let YTPlayer = null;
let YTReady = false;
let pendingVideoId = null;
let videoLoadedFlag = false;
const playerPosterEl = document.getElementById("playerPoster");
const playerPosterImgEl = document.getElementById("playerPosterImg");
const playerReplayBtn = document.getElementById("playerReplayBtn");
let currentVideoId = "";
let currentModuleTitle = "";

const playerStartCover = document.getElementById("playerStartCover");
const playerStartTitle = document.getElementById("playerStartTitle");

function showPlayerStartCover(title){
  if (playerStartTitle) playerStartTitle.textContent = title || "Cargando clase...";
  if (playerStartCover) playerStartCover.classList.remove("hide");
}

function hidePlayerStartCover(){
  if (playerStartCover) playerStartCover.classList.add("hide");
}


const playerBrandCourseEl = document.getElementById("playerBrandCourse");
const playerBrandModuleEl = document.getElementById("playerBrandModule");
let brandBarsTimer = null;
let showBrandBarsOnceForModule = false;

function updateBrandBars(courseTitle, moduleTitle){
  if (playerBrandCourseEl) playerBrandCourseEl.textContent = courseTitle || "Curso";
  if (playerBrandModuleEl) playerBrandModuleEl.textContent = moduleTitle || "Cargando módulo...";
}

function showBrandBars(){
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.add("show-brand-bars");
  window.clearTimeout(brandBarsTimer);
}

function hideBrandBars(delay){
  const playerBox = document.querySelector(".player");
  window.clearTimeout(brandBarsTimer);
  brandBarsTimer = window.setTimeout(() => {
    if (playerBox) playerBox.classList.remove("show-brand-bars");
  }, typeof delay === "number" ? delay : 3000);
}


function setPlayerLoading(videoId, title){
  currentVideoId = normalizeVideoId_(videoId);
  currentModuleTitle = title || "";
  updateBrandBars(document.getElementById("courseTitle")?.textContent || "Curso", currentModuleTitle || "Cargando módulo...");
  showBrandBarsOnceForModule = true;
  showBrandBars();
  const poster = currentVideoId ? `https://i.ytimg.com/vi/${currentVideoId}/hqdefault.jpg` : "icons/icon-512.png";
  if (playerPosterImgEl) playerPosterImgEl.src = poster;
  if (playerPosterEl) playerPosterEl.classList.remove("is-ended");
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.add("is-loading");
}

function hidePlayerPoster(){
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.remove("is-loading");
  if (playerPosterEl) playerPosterEl.classList.remove("is-ended");
}

function showEndedPoster(){
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.add("is-loading");
  if (playerPosterEl) playerPosterEl.classList.add("is-ended");
}

if (playerReplayBtn){
  playerReplayBtn.addEventListener("click", () => {
    if (!currentVideoId) return;
    setPlayerLoading(currentVideoId, currentModuleTitle);
    showBrandBarsOnceForModule = true;
    showBrandBars();
    loadVideoById_(currentVideoId, true);
  });
}


function fmtTime_(sec){
  sec = Math.max(0, Math.floor(sec || 0));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}

function normalizeVideoId_(value){
  if (!value) return "";
  const v = String(value).trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
  const m = v.match(/(?:youtu\.be\/|v=|\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : "";
}

function ensureYT_(){
  if (document.getElementById("ytApiLoaded")) return;
  const s = document.createElement("script");
  s.id = "ytApiLoaded";
  s.src = "https://www.youtube.com/iframe_api";
  s.async = true;
  document.head.appendChild(s);
}

function ensureYTAndLoad_(videoId, autoplay){
  const vid = normalizeVideoId_(videoId);
  if (!vid) return;
  pendingVideoId = vid;
  pendingAutoplay = !!autoplay;
  if (YTReady){
    loadVideoById_(vid, autoplay);
    return;
  }
  ensureYT_();
}

function loadVideoById_(videoId, autoplay){
  const vid = normalizeVideoId_(videoId);
  if (!vid) return;
  if (YTReady && YTPlayer && typeof YTPlayer.loadVideoById === "function"){
    YTPlayer.loadVideoById({ videoId: vid, startSeconds: 0 });
    if (autoplay) YTPlayer.playVideo();
  } else {
    pendingVideoId = vid;
    pendingAutoplay = !!autoplay;
  }
}

function setupControls_(){
  const btn = document.getElementById("ccPlay");
  const seek = document.getElementById("ccSeek");
  const time = document.getElementById("ccTime");
  const fs = document.getElementById("ccFs");
  const wrap = document.querySelector(".player-wrap");
  let seeking = false;


  const speedBtn = document.getElementById("ccSpeedBtn");
  const speedRates = [0.5, 0.75, 1, 1.25, 1.5, 2];
  let speedIdx = 2; // 1x

  function applySpeed_(){
    if (!YTPlayer) return;
    const r = speedRates[speedIdx] || 1;
    try{ YTPlayer.setPlaybackRate(r); }catch(e){}
    if (speedBtn) speedBtn.textContent = (r % 1 === 0 ? String(r).replace('.0','') : String(r)) + "x";
  }

  if (speedBtn){
    speedBtn.addEventListener("click", () => {
      speedIdx = (speedIdx + 1) % speedRates.length;
      applySpeed_();
    });
  }

  if (btn){
    btn.addEventListener("click", () => {
      if (!YTPlayer) return;
      const st = YTPlayer.getPlayerState();
      if (st === 1) YTPlayer.pauseVideo();
      else YTPlayer.playVideo();
    });
  }

  if (seek){
    seek.addEventListener("input", () => { seeking = true; });
    seek.addEventListener("change", () => {
      if (!YTPlayer) return;
      const dur = YTPlayer.getDuration ? YTPlayer.getDuration() : 0;
      const v = Number(seek.value || 0) / 1000;
      if (dur > 0) YTPlayer.seekTo(dur * v, true);
      seeking = false;
    });
  }

  // Fullscreen propio (funciona en móvil, depende del navegador)
  async function toggleFs(){
    if (!wrap) return;
    try{
      const isFs = document.fullscreenElement || document.webkitFullscreenElement;
      if (isFs){
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
      } else {
        if (wrap.requestFullscreen) await wrap.requestFullscreen();
        else if (wrap.webkitRequestFullscreen) await wrap.webkitRequestFullscreen();
      }
    }catch(e){}
  }
  if (fs) fs.addEventListener("click", toggleFs);

  // Actualiza UI
  setInterval(() => {
    if (!YTPlayer) return;
    if (seek && !seeking){
      const dur = YTPlayer.getDuration ? YTPlayer.getDuration() : 0;
      const cur = YTPlayer.getCurrentTime ? YTPlayer.getCurrentTime() : 0;
      if (dur > 0){
        seek.value = String(Math.round((cur / dur) * 1000));
        if (time) time.textContent = fmtTime_(cur) + " / " + fmtTime_(dur);
        if (currentModuleIndex >= 0){
          const now = Date.now();
          if (currentModuleIndex !== lastSavedModuleIndex || (now - lastProgressSaveAt) >= 5000){
            setCurrentTimeForModule(currentModuleIndex, cur);
            lastSavedModuleIndex = currentModuleIndex;
            lastProgressSaveAt = now;
          }
        }
      }
    }
  }, 1000);
}

// YouTube API callback
window.onYouTubeIframeAPIReady = function(){
  YTReady = true;

  YTPlayer = new YT.Player("player", {
    host: "https://www.youtube-nocookie.com",
    width: "100%",
    height: "100%",
    playerVars: {
      controls: 0,          // sin botones de YouTube (no share, no YouTube button)
      rel: 0,
      modestbranding: 1,
      iv_load_policy: 3,
      playsinline: 1,
      disablekb: 1,
      fs: 0,
      origin: location.origin
    },
    events: {
      onReady: () => {
        setupControls_();
        if (pendingVideoId){
          const autoplayPending = pendingAutoplay;
          loadVideoById_(pendingVideoId, autoplayPending);
          pendingVideoId = null;
          pendingAutoplay = false;
        }
      },
      onStateChange: (e) => {
        const btn = document.getElementById("ccPlay");
        if (btn) {
          if (e.data === 1) btn.textContent = "⏸";
          else btn.textContent = "▶";
        }

        if (e.data === 1 && currentModuleIndex >= 0) {
          hidePlayerPoster();
          hidePlayerStartCover();
          if (showBrandBarsOnceForModule) {
            hideBrandBars(3000);
            showBrandBarsOnceForModule = false;
          }
          renderProgressUI();
          if (resumePending) {
            const resume = getResumeTime(currentModuleIndex);
            if (resume > 2) {
              try { YTPlayer.seekTo(resume, true); } catch(err){}
            }
            resumePending = false;
          }
        }

        if (e.data === 3 || e.data === -1 || e.data === 5) {
          const playerBox = document.querySelector(".player");
          if (playerBox && !playerBox.classList.contains("is-loading")) {
            playerBox.classList.add("is-loading");
            if (playerPosterEl) playerPosterEl.classList.remove("is-ended");
          }
        }

        if (e.data === 2) {
          persistProgressNow();
          hidePlayerPoster();
          hidePlayerStartCover();
        }

        if (e.data === 0 && currentModuleIndex >= 0) {
          persistProgressNow();
          markModuleCompleted(currentModuleIndex);
          const nextIndex = currentModuleIndex + 1;
          if (nextIndex < courseModules.length) {
            setTimeout(() => openModuleByIndex(nextIndex, false), 700);
          } else {
            try { YTPlayer.stopVideo(); } catch(err){}
            showEndedPoster();
          }
        }
      }
    }
  });
};

</script>

<script>

function cleanEmbedUrl_(url){
  const u = String(url||"").trim();
  if(!u) return "";
  // Cambia a youtube-nocookie cuando sea embed de YouTube
  let out = u.replace("https://www.youtube.com/embed/","https://www.youtube-nocookie.com/embed/")
             .replace("http://www.youtube.com/embed/","https://www.youtube-nocookie.com/embed/")
             .replace("https://youtu.be/","https://www.youtube-nocookie.com/embed/");
  // Asegura parámetros para reducir elementos de YouTube (no se puede ocultar 100% por políticas de YouTube)
  const hasQuery = out.includes("?");
  const params = new URLSearchParams(hasQuery ? out.split("?")[1] : "");
  if(!params.has("rel")) params.set("rel","0");
  if(!params.has("modestbranding")) params.set("modestbranding","1");
  if(!params.has("iv_load_policy")) params.set("iv_load_policy","3");
  if(!params.has("playsinline")) params.set("playsinline","1");
  if(!params.has("controls")) params.set("controls","1");
  if(!params.has("fs")) params.set("fs","1");         // fullscreen on
  if(!params.has("disablekb")) params.set("disablekb","0");
  out = out.split("?")[0] + "?" + params.toString();
  return out;
}

function escapeHtml_(s){
  return String(s||"").replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

  const API_URL = "https://pasir-proxy.vercel.app/api";

  function jsonp(action, payload) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const params = new URLSearchParams();
      params.set("action", action);
      Object.entries(payload || {}).forEach(([k,v]) => {
        if (v === undefined || v === null) return;
        params.set(k, String(v));
      });
      params.set("callback", cb);

      const script = document.createElement("script");
      script.src = API_URL + "?" + params.toString();
      script.async = true;

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        try { delete window[cb]; } catch(e) { window[cb] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = () => {
        cleanup();
        reject(new Error("No se pudo conectar (JSONP)."));
      };

      document.body.appendChild(script);
    });
  }

  const token = localStorage.getItem("pasir_token");
  if (!token) location.replace("login.html");

  const params = new URLSearchParams(location.search);
  const courseId = params.get("courseId");
  const courseProgressKey = () => "pasir_progress_" + (courseId || "curso");
  let courseModules = [];
  let currentModuleIndex = -1;
  let resumePending = false;
  let lastProgressSaveAt = 0;
  let lastSavedModuleIndex = -1;

  function loadCourseProgress(){
    try { return JSON.parse(localStorage.getItem(courseProgressKey()) || "{}"); }
    catch(e){ return {}; }
  }

  function saveCourseProgress(data){
    localStorage.setItem(courseProgressKey(), JSON.stringify(data || {}));
  }
  function ensureTotalModulesSaved(total){
    const p = loadCourseProgress();
    p.totalModules = Number(total || 0);
    saveCourseProgress(p);
  }


  function markModuleCompleted(idx){
    const p = loadCourseProgress();
    if (!Array.isArray(p.completed)) p.completed = [];
    if (!p.completed.includes(idx)) p.completed.push(idx);
    p.lastIndex = idx;
    p.updatedAt = Date.now();
    saveCourseProgress(p);
    renderProgressUI();
  }

  function setLastModule(idx){
    const p = loadCourseProgress();
    p.lastIndex = idx;
    p.lastTime = 0;
    p.updatedAt = Date.now();
    saveCourseProgress(p);
    lastSavedModuleIndex = idx;
    lastProgressSaveAt = Date.now();
    renderProgressUI();
  }

  function setCurrentTimeForModule(idx, seconds){
    const p = loadCourseProgress();
    p.lastIndex = idx;
    p.lastTime = Math.max(0, Math.floor(seconds || 0));
    p.updatedAt = Date.now();
    saveCourseProgress(p);
  }

  function getResumeTime(idx){
    const p = loadCourseProgress();
    if (p.lastIndex === idx) return Math.max(0, Math.floor(p.lastTime || 0));
    return 0;
  }

  function persistProgressNow(){
    if (!YTPlayer || currentModuleIndex < 0) return;
    const cur = YTPlayer.getCurrentTime ? YTPlayer.getCurrentTime() : 0;
    setCurrentTimeForModule(currentModuleIndex, cur);
    lastSavedModuleIndex = currentModuleIndex;
    lastProgressSaveAt = Date.now();
  }

  function completedPercent(){
    const p = loadCourseProgress();
    const total = courseModules.length || 0;
    const done = Array.isArray(p.completed) ? p.completed.length : 0;
    return total ? Math.round((done / total) * 100) : 0;
  }

  function renderProgressUI(){
    const p = loadCourseProgress();
    const completed = Array.isArray(p.completed) ? p.completed : [];
    const badge = document.getElementById("courseProgressBadge");
    if (badge) badge.textContent = completedPercent() + "%";

    document.querySelectorAll("#modules .mod").forEach((btn, idx) => {
      btn.classList.remove("done","current");
      const s = btn.querySelector(".s");
      if (completed.includes(idx)) {
        btn.classList.add("done");
        if (s) {
          s.textContent = "Completada";
          s.classList.add("completed-text");
        }
      } else {
        if (s) {
          s.textContent = "Toca para reproducir";
          s.classList.remove("completed-text");
        }
      }
      if (idx === currentModuleIndex) {
        btn.classList.add("current");
        if (s && !completed.includes(idx)) s.textContent = "En reproducción";
      }
    });
  }

  function openModuleByIndex(idx, shouldResume){
    const btn = document.querySelectorAll("#modules .mod")[idx];
    if (!btn) return;
    resumePending = !!shouldResume;
    btn.click();
  }


  document.getElementById("logout").onclick = () => {
    localStorage.removeItem("pasir_token");
    location.replace("index.html");
  };

  function setActive(btn) {
    document.querySelectorAll(".mod").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  function showError(text) {
    document.getElementById("msg").textContent = text || "";
  }

  window.addEventListener("beforeunload", () => {
    try { persistProgressNow(); } catch(e) {}
  });

  (async () => {
    if (!courseId) {
      showError("Falta courseId en la URL. Ej: course.html?courseId=logo8-basico");
      return;
    }

    const r = await jsonp("course", { token, courseId });
    if (!r.ok) {
      showError(r.error || "No se pudo cargar el curso.");
      if ((r.error || "").toLowerCase().includes("no autorizado")) {
        setTimeout(()=> location.replace("account.html"), 800);
      }
      return;
    }

    document.getElementById("courseTitle").textContent = r.course.title || courseId;
    updateBrandBars(r.course.title || courseId, currentModuleTitle || "Cargando módulo...");
    showPlayerStartCover("Cargando clase...");

    const box = document.getElementById("modules");
    box.innerHTML = "";
    showError("");

        courseModules = Array.isArray(r.modules) ? r.modules : [];
    ensureTotalModulesSaved(courseModules.length);
    document.getElementById("countMods").textContent = (courseModules.length||0) + " clases";
    courseModules.forEach((m, idx) => {
      const b = document.createElement("button");
      b.className = "mod";
      b.dataset.index = idx;
      const videoId = (m.videoId) || (m.embedUrl || "").split("/embed/")[1]?.split("?")[0] || "";
      const thumb = videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : "icons/icon-192.png";
      b.innerHTML = `
        <div class="thumb"><img src="${thumb}" alt=""></div>
        <div class="info">
          <p class="t">${escapeHtml_(`${m.order}. ${m.title}`)}</p>
          <p class="s">Toca para reproducir</p>
        </div>
      `;
      b.onclick = () => {
        currentModuleIndex = idx;
        setActive(b);
        setLastModule(idx);
        videoLoadedFlag = true;
        showPlayerStartCover(m.title);
        setPlayerLoading(videoId, m.title);
        ensureYTAndLoad_(videoId, false);
        document.getElementById("nowPlaying").textContent = "Reproduciendo: " + m.title;
        const nt = document.getElementById("nowTitle"); if (nt) nt.textContent = m.title;
        const yt = document.getElementById("openYT");
        if (yt) yt.removeAttribute("href");
        renderProgressUI();
      };
      box.appendChild(b);
    });

    renderProgressUI();
    const saved = loadCourseProgress();
    const startIndex = (typeof saved.lastIndex === "number" && saved.lastIndex >= 0 && saved.lastIndex < courseModules.length) ? saved.lastIndex : 0;
    if (courseModules.length > 0) {
      currentModuleIndex = startIndex;
      const firstBtn = box.querySelector(`.mod[data-index="${startIndex}"]`);
      if (firstBtn) {
        setActive(firstBtn);
        firstBtn.classList.add("current");
      }
      const firstModule = courseModules[startIndex];
      if (firstModule) {
        const firstVideoId = (firstModule.videoId) || (firstModule.embedUrl || "").split("/embed/")[1]?.split("?")[0] || "";
        setPlayerLoading(firstVideoId, firstModule.title);
        document.getElementById("nowPlaying").textContent = "Listo para continuar: " + firstModule.title;
        const nt = document.getElementById("nowTitle"); if (nt) nt.textContent = firstModule.title;
      }
      renderProgressUI();
    }
  })().catch(err => {
    showError(err.message || String(err));
  });
</script>

<script>
(function(){
  const token = localStorage.getItem("pasir_token");
  const userMenu = document.getElementById("userMenu");
  const userTrigger = document.getElementById("userTrigger");
  const userDropdown = document.getElementById("userDropdown");
  const userNameEl = document.getElementById("userName");

  // Toggle dropdown
  function closeMenu(){
    if (!userDropdown) return;
    userDropdown.classList.remove("open");
    if (userTrigger) userTrigger.setAttribute("aria-expanded","false");
  }
  function openMenu(){
    if (!userDropdown) return;
    userDropdown.classList.add("open");
    if (userTrigger) userTrigger.setAttribute("aria-expanded","true");
  }
  if (userTrigger && userDropdown){
    userTrigger.addEventListener("click", (e)=>{
      e.stopPropagation();
      userDropdown.classList.contains("open") ? closeMenu() : openMenu();
    });
    document.addEventListener("click", ()=> closeMenu());
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeMenu(); });
    userDropdown.addEventListener("click", (e)=> e.stopPropagation());
  }

  // Fill name (uses jsonp() already defined in this page)
  if (token && userMenu) userMenu.style.display = "inline-block";

  async function hydrateUser(){
    const storedName = localStorage.getItem("pasir_email");
    if (storedName && userNameEl) userNameEl.textContent = storedName;
    if (!token) return;
    try{
      const r = await jsonp("me", { token });
      if (!r.ok) return;
      const email = (r.user && (r.user.email || r.user.correo)) || r.email || localStorage.getItem("pasir_email") || "—";
      const label = email;

      if (userNameEl) userNameEl.textContent = label;
      localStorage.setItem("pasir_email", label);
      if (userMenu) userMenu.style.display = "inline-block";
    }catch(e){}
  }
  setTimeout(hydrateUser, 1200);

  // Logout (keep behavior: clear token and go to index)
  const logoutBtn = document.getElementById("logout");
  if (logoutBtn){
    logoutBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      localStorage.removeItem("pasir_token");
      localStorage.removeItem("pasir_email");
      localStorage.removeItem("pasir_name");
      location.replace("index.html");
    });
  }
})();
</script>


<script>
/* ==== Mostrar controles propios al tocar el video (y bloquear toques al player nativo) ==== */
(function(){
  const shield = document.getElementById("tapShield");
  const wrap = document.getElementById("ccWrap");
  let hideTimer = null;

  function showControls(){
    if (!wrap || !videoLoadedFlag) return;
    wrap.classList.add("is-visible");
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      wrap.classList.remove("is-visible");
    }, 3200);
  }

  // Tocar el video: solo muestra controles, NO deja interactuar con el iframe
  if (shield){
    shield.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      showControls();
    }, {passive:false});

    shield.addEventListener("touchstart", (e) => {
      e.preventDefault();
      e.stopPropagation();
      showControls();
    }, {passive:false});
  }

  // Si tocan el área de controles, no ocultar inmediatamente
  if (wrap){
    wrap.addEventListener("pointerdown", () => {
      if (hideTimer) clearTimeout(hideTimer);
    });
    wrap.addEventListener("pointerup", () => {
      showControls();
    });
  }

  // Exponer para otros scripts si hace falta
  window.__showCustomControls = showControls;
})();
</script>

<script id="mobile-summary-remove-fix">
(function(){
  function isPortraitMobile(){
    return window.matchMedia('(max-width: 700px) and (orientation: portrait)').matches;
  }
  function removeSummaryTextBlock(){
    if(!isPortraitMobile()) return;
    var phrases = [
      'Haz clic en una clase del panel para empezar o continuar donde te quedaste.',
      'Haz clic en una clase del panel para empezar',
      'continuar donde te quedaste'
    ];
    var nodes = Array.prototype.slice.call(document.querySelectorAll('div, section, article, aside'));
    nodes.forEach(function(el){
      var txt = (el.innerText || '').replace(/\s+/g, ' ').trim();
      if(!txt || txt.length > 220) return;
      var hasPhrase = phrases.some(function(p){ return txt.indexOf(p) !== -1; });
      if(!hasPhrase) return;
      var heading = el.querySelector('h1,h2,h3,h4,.title,.lesson-title,.session-title');
      if(heading && /sesi[oó]n\s*1/i.test((heading.textContent || '').trim())){
        el.style.display = 'none';
      }
    });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', removeSummaryTextBlock, {once:true});
  } else {
    removeSummaryTextBlock();
  }
  window.addEventListener('resize', removeSummaryTextBlock);
})();
</script>
