<style id="app-css-inline">
/* app.css — Pasir Virtual School UI (global) */
:root{
  color-scheme: light dark;

  --primary:#2563eb;
  --accent:#38bdf8;
  --success:#22c55e;
  --danger:#ef4444;

  /* Light: azul/celeste elegante (no blanco plano) */
  --bg:#f2f7ff;
  --bg2:#eaf4ff;
  --card:#ffffff;
  --card2: rgba(37,99,235,.06);
  --stroke: rgba(37,99,235,.18);
  --text:#0b1220;
  --muted:#475569;

  --shadow: 0 18px 45px rgba(2, 6, 23, .10);
  --r: 18px;
  --pill: 999px;
  --t: .18s ease-out;
}

body[data-theme="dark"]{
  --bg:#0b1220;
  --bg2:#09101d;
  --card: rgba(15,23,42,.96);
  --card2: rgba(255,255,255,.06);
  --stroke: rgba(148,163,184,.22);
  --text:#f9fafb;
  --muted: rgba(255,255,255,.70);
  --shadow: 0 18px 55px rgba(0,0,0,.55);
}

*{box-sizing:border-box}
html,body{height:100%}
body{
  margin:0;
  font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans", "Helvetica Neue", sans-serif;
  background:
    radial-gradient(900px 520px at 12% -10%, rgba(56,189,248,.20), transparent 60%),
    radial-gradient(860px 520px at 95% 0%, rgba(37,99,235,.18), transparent 55%),
    linear-gradient(180deg, var(--bg), var(--bg2));
  color: var(--text);
}

a{color:inherit}
.container{width:min(1120px,92vw); margin:0 auto}
.muted{color:var(--muted)}
.hr{height:1px;background:var(--stroke);border:0;margin:16px 0}

/* Header (unificado) */
.app-header{
  position:sticky; top:0; z-index:80;
  border-bottom:1px solid var(--stroke);
  background: color-mix(in oklab, var(--card) 82%, transparent);
  backdrop-filter: blur(10px);
}
.app-header .row{
  display:flex; align-items:center; justify-content:space-between; gap:12px;
  padding:12px 0;
}
.brand{
  display:flex; align-items:center; gap:10px;
  font-weight:1000;
  letter-spacing:.2px;
}
.brand .dot{
  width:10px;height:10px;border-radius:999px;
  background:var(--accent);
  box-shadow:0 0 0 6px rgba(56,189,248,.16);
}
.nav-actions{display:flex; align-items:center; gap:10px; flex-wrap:wrap}

/* Buttons */
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:8px;
  padding:10px 12px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background: var(--card);
  color: var(--text);
  text-decoration:none;
  cursor:pointer;
  font-weight:900;
  transition: transform var(--t), border-color var(--t), filter var(--t);
}
.btn:hover{transform:translateY(-1px); border-color: rgba(56,189,248,.55)}
.btn:active{transform:translateY(0) scale(.99)}
.btn.primary{background: var(--primary); color:#fff; border-color: rgba(37,99,235,.55)}
.btn.secondary{background: rgba(56,189,248,.16); border-color: rgba(56,189,248,.30)}
.btn.danger{background: rgba(239,68,68,.14); border-color: rgba(239,68,68,.30)}
.btn.full{width:100%}
.theme-btn{width:40px;height:40px;border-radius:var(--pill);padding:0}
.sr-only{position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;clip:rect(0,0,0,0);white-space:nowrap;border:0}

/* Cards */
.card{
  border:1px solid var(--stroke);
  border-radius: var(--r);
  background: var(--card2);
  box-shadow: var(--shadow);
}
.card-inner{background: var(--card); border-radius: calc(var(--r) - 6px); padding:18px; border:1px solid color-mix(in oklab, var(--stroke) 70%, transparent)}
.stack{display:flex; flex-direction:column; gap:12px}

/* Forms */
.field{display:flex; flex-direction:column; gap:6px; margin:10px 0}
label{color:var(--muted); font-weight:800; font-size:.95rem}
input,select,textarea{
  width:100%;
  padding:12px 12px;
  border-radius:14px;
  border:1px solid var(--stroke);
  background: var(--card);
  color: var(--text);
  outline:none;
}
input:focus,select:focus,textarea:focus{
  border-color: rgba(56,189,248,.55);
  box-shadow:0 0 0 4px rgba(56,189,248,.18);
}

.page{padding:18px 0 30px}
.hero{
  padding:18px;
  border-radius: var(--r);
  border:1px solid var(--stroke);
  background: linear-gradient(135deg, rgba(37,99,235,.14), rgba(56,189,248,.10));
}

/* Course safe overrides: don't affect your player logic */
.player-wrap, .player{background:transparent !important}


/* ===== Pasir theme helpers unificados ===== */
html[data-theme="dark"], body[data-theme="dark"]{
  color-scheme: dark;
}
html[data-theme="light"], body[data-theme="light"]{
  color-scheme: light;
}
body{
  transition: background .25s ease, color .25s ease;
}
body[data-theme="dark"] .card,
body[data-theme="dark"] .app-header,
body[data-theme="dark"] .btn,
body[data-theme="dark"] .currency-pop,
body[data-theme="dark"] .currency-select{
  color: var(--text);
}
body[data-theme="dark"] .muted{
  color: var(--muted) !important;
}
body[data-theme="dark"] .btn.secondary{
  background: rgba(56,189,248,.14);
  color: var(--text);
}
body[data-theme="dark"] .btn.primary{
  color:#fff;
}

</style>
<style id="course-css-inline">
:root{
      --bg:#0b1220;
      --panel:rgba(255,255,255,.06);
      --panel2:rgba(255,255,255,.04);
      --stroke:rgba(148,163,184,.22);
      --text:#f9fafb;
      --muted:rgba(255,255,255,.70);
      --green:#22c55e;
      --blue:#38bdf8;
    }
    *{box-sizing:border-box}
    body{margin:0;font-family:system-ui;background:var(--bg);color:var(--text)}
    a{color:inherit}

    /* Header */
    header{
      position:sticky;top:0;z-index:20;
      padding:14px 16px;
      border-bottom:1px solid var(--stroke);
      background:var(--panel2);
      backdrop-filter: blur(8px);
      display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;
    }
    #courseTitle{font-weight:1000;font-size:20px;}
    .muted{color:var(--muted)}

    .top-actions{display:flex;gap:10px;align-items:center;flex-wrap:wrap}
    .topbtn{
      display:inline-flex;align-items:center;gap:8px;
      padding:10px 12px;border-radius:12px;text-decoration:none;font-weight:900;
      border:1px solid transparent;
    }
    .secondary{background:rgba(56,189,248,.18);border-color:rgba(56,189,248,.35)}
    .primary{background:var(--green);color:#071018;border:0;cursor:pointer}

    /* Layout like Udemy mobile: player arriba + módulos abajo */
    .container{max-width:1080px;margin:0 auto;padding:14px 14px 28px}
    .player-wrap{
      border:1px solid var(--stroke);
      border-radius:18px;
      overflow:hidden;
      background:var(--panel2);
      box-shadow:0 18px 40px rgba(0,0,0,.35);
    }
    .player{
      position:relative;
      width:100%;
      padding-top:56.25%;
      background:rgba(0,0,0,.25);
    }
    iframe{position:absolute;inset:0;width:100%;height:100%}

    .player-meta{
      display:flex;justify-content:space-between;align-items:flex-start;gap:10px;
      padding:12px 12px 12px;
      border-top:1px solid var(--stroke);
    }
    .player-meta .left{min-width:0}
    .player-meta .left .now{font-weight:900}
    .player-meta .left .hint{font-size:12px;color:var(--muted);margin-top:4px}
    .player-meta .right{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}
    .smallbtn{
      padding:10px 12px;border-radius:12px;
      border:1px solid var(--stroke);
      background:rgba(255,255,255,.06);
      text-decoration:none;font-weight:900;
    }
    .smallbtn:hover{border-color:rgba(255,255,255,.28)}

    /* Curriculum */
    .curriculum{
      margin-top:14px;
      border:1px solid var(--stroke);
      border-radius:18px;
      overflow:hidden;
      background:var(--panel2);
    }
    .curriculum-h{
      padding:14px 14px;
      display:flex;justify-content:space-between;align-items:center;gap:12px;
      border-bottom:1px solid var(--stroke);
      background:rgba(255,255,255,.03);
    }
    .curriculum-h h2{margin:0;font-size:16px;letter-spacing:.2px}
    .curriculum-h .sub{font-size:12px;color:var(--muted)}

    #modules{display:flex;flex-direction:column}

    /* Udemy-like rows */
    .mod{
      width:100%;
      text-align:left;
      display:flex;gap:12px;align-items:center;
      padding:12px 14px;
      border:0;
      background:transparent;
      color:inherit;
      cursor:pointer;
      border-bottom:1px solid rgba(148,163,184,.18);
    }
    .mod:last-child{border-bottom:0}
    .mod:hover{background:rgba(255,255,255,.04)}
    .mod.active{background:rgba(34,197,94,.10)}
    .mod .thumb{
      width:84px;aspect-ratio:16/9;border-radius:12px;overflow:hidden;

    .mod .thumb img{width:100%;height:100%;object-fit:cover;display:block}

    .mod .info .s{margin:6px 0 0;font-size:12px;color:var(--muted)}
    .mod .meta{
      flex:0 0 auto;
      display:flex;align-items:center;gap:8px;
      color:rgba(255,255,255,.85);
      font-weight:900;
      font-size:12px;
    }
    .pill{
      padding:6px 10px;border-radius:999px;
      border:1px solid rgba(255,255,255,.12);
      background:rgba(255,255,255,.06);
      white-space:nowrap;
    }

    .err{color:#fca5a5;font-weight:800;white-space:pre-wrap;padding:12px 14px}

    /* Responsive refinements */
    @media (max-width: 520px){
      header{padding:12px 12px}
      .container{padding:12px 12px 24px}
      .mod .thumb{width:74px}

    /* Layout split (tipo Udemy) en pantallas anchas / horizontal */

      }

    }
    .user-trigger:hover{border-color:rgba(255,255,255,.28)}
    .avatar{display:inline-flex;width:26px;height:26px;align-items:center;justify-content:center;
      border-radius:999px;background:rgba(56,189,248,.18);border:1px solid rgba(56,189,248,.30)}
    .caret{opacity:.85}
    .user-dropdown{z-index:50;
      position:absolute;right:0;top:calc(100% + 10px);
      min-width:210px;
      border:1px solid rgba(148,163,184,.22);
      background:rgba(15,23,42,.96);
      backdrop-filter: blur(10px);
      border-radius:14px;
      box-shadow:0 24px 60px rgba(0,0,0,.45);
      padding:8px;
      display:none;
    }
    .user-dropdown.open{display:block}
    .dd-item{
      width:100%;
      display:flex;align-items:center;gap:10px;
      padding:10px 10px;border-radius:12px;

    .dd-item:hover{background:rgba(255,255,255,.06)}
    .dd-sep{height:1px;background:rgba(148,163,184,.18);margin:6px 4px}
    .dd-item.danger{color:#fecaca}

  
/* === Ajustes responsive mínimos, sin tocar tu estilo base === */
.wrap{

#openYT{display:none !important;}

/* ==== Player con API + controles propios ==== */
.yt-player{
  position:absolute; inset:0;
  width:100%; height:100%;
}
/* Controles propios (funcionan en móvil) */
.cc-wrap{
  display:flex; gap:10px; align-items:center; flex-wrap:nowrap;
}
.cc-btn{
  width:44px; height:38px;
  border:0; border-radius:12px;
  background:rgba(255,255,255,.10);
  color:#fff; font-size:18px;
}
.cc-seek{ flex:1; min-width: 120px; }
.cc-time{ font-variant-numeric: tabular-nums; opacity:.85; font-size: 13px; white-space: nowrap; }

/* Pantalla completa: estira el contenedor del player */
.player-wrap:fullscreen{
  width:100vw; height:100vh;
  max-width:none;
  border-radius:0;
}
.player-wrap:fullscreen .player{
  padding-top:0 !important;
  height:100vh !important;
}

/* ==== Bloquear interacción directa con el player (taps) y mostrar controles propios al tocar ==== */
.player-wrap{ position:relative !important; }

/* Cubre el área del video para que NO se puedan tocar los controles nativos */
.tap-shield{
  position:absolute;
  left:0; top:0; right:0;
  /* altura del área video (la parte superior de la card). Ajusta si cambia el layout */
  height: calc(100% - 0px);
  z-index: 50;
  background: transparent;
  pointer-events: auto;
}

/* Controles propios flotando sobre el video (abajo) */
#ccWrap{
  position:absolute !important;
  left:12px; right:12px;
  bottom:28px;
  z-index: 60;
  opacity: 0;
  transform: translateY(8px);
  pointer-events: none;
  transition: opacity .18s ease, transform .18s ease;
}

/* Estado visible */
#ccWrap.is-visible{
  opacity: 1;
  transform: translateY(0);
  pointer-events: auto;
}

/* En horizontal/fullscreen, que el overlay y controles sigan funcionando */
.player-wrap:fullscreen #ccWrap,
.player-wrap:-webkit-full-screen #ccWrap{
  left:16px; right:16px; bottom:28px;
}
.player-wrap:fullscreen .tap-shield,
.player-wrap:-webkit-full-screen .tap-shield{
  left:0; top:0; right:0; bottom:0;
  height: 100%;
}

/* Importante: que el tapShield NO cubra los controles */
#ccWrap{ }

/* Separar título del área de controles */
.player-meta .left{ margin-top: 22px !important; }

/* Botón velocidad */
.cc-speed{ width:56px !important; font-size:14px !important; }

/* Subir controles un poco más arriba para no tapar título */
#ccWrap{ bottom:28px !important; }

/* Ocultar perfil/correo dentro del curso */
#userMenu, #userDropdown, .user-menu, .user-dropdown, .user-chip, .profile-chip { display:none !important; }

/* Header PASIR Academy más delgado */
.app-header{
  padding:4px 12px !important;
  height:50px !important;
  min-height:50px !important;
}

.app-header .container{
  padding:0 !important;
}

.app-header .row{
  height:50px !important;
  min-height:50px !important;
  display:flex;
  align-items:center;
}

/* ===== Ajustes pedidos: reproductor más grande/cerca + botones visibles en modo claro ===== */

  padding-top: 8px !important;
}
main.page > .container > .container{
  padding: 0 !important;

}

body[data-theme="light"] #ccSpeedBtn,
body[data-theme="light"] #ccFs,
body[data-theme="light"] .cc-btn{
  background: #eaf2ff !important;

body[data-theme="light"] .cc-time{

.player{overflow:hidden}

.player-poster{
  position:absolute;inset:0;z-index:45;display:flex;align-items:center;justify-content:center;
  background:#050b16;opacity:0;pointer-events:none;transition:opacity .22s ease
}

  position:absolute;inset:0;width:100%;height:100%;object-fit:cover;filter:brightness(.82)
}
.player-poster::after{
  content:"";position:absolute;inset:0;background:linear-gradient(to top, rgba(0,0,0,.34), rgba(0,0,0,.12))
}
.player-loading-card{

.player-poster.is-ended .player-loading-card{display:none}

<script id="theme-js-inline">
// theme.js — Tema global Pasir (Light/Dark) sin tocar tu lógica
(function(){
  const KEY = "pasir-theme";

  function setTheme(theme){
    document.documentElement.setAttribute("data-theme", theme);
    if (document.body) document.body.setAttribute("data-theme", theme);
    const dark = theme === "dark";

    const icon = document.getElementById("theme-icon");
    const label = document.getElementById("theme-label");
    if (icon) icon.textContent = dark ? "🌙" : "☀️";
    if (label) label.textContent = dark ? "Modo oscuro" : "Modo claro";

    const meta = document.getElementById("theme-color-meta") || document.querySelector('meta[name="theme-color"]');
    if (meta) meta.setAttribute("content", dark ? "#0b1220" : "#f2f7ff");

    try{ localStorage.setItem(KEY, theme); }catch(e){}
  }

  function init(){
    let saved = null;
    try{ saved = localStorage.getItem(KEY); }catch(e){}
    setTheme(saved === "dark" ? "dark" : "light");

    const btn = document.getElementById("theme-toggle");
    if (btn && !btn.__pasirBound){
      btn.__pasirBound = true;
      btn.addEventListener("click", (e)=>{
        e.preventDefault();
        const cur = document.body.getAttribute("data-theme") || "light";
        setTheme(cur === "dark" ? "light" : "dark");
      });
    }
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", init, {once:true});
  } else {
    init();
  }
})();

</script>

<script>
/* ===== YouTube IFrame Player API (sin UI de YouTube) + controles propios ===== */
let YTPlayer = null;
let YTReady = false;
let pendingVideoId = null;
let videoLoadedFlag = false;
const playerPosterEl = document.getElementById("playerPoster");
const playerPosterImgEl = document.getElementById("playerPosterImg");
const playerReplayBtn = document.getElementById("playerReplayBtn");
let currentVideoId = "";
let currentModuleTitle = "";

const playerStartCover = document.getElementById("playerStartCover");
const playerStartTitle = document.getElementById("playerStartTitle");

function showPlayerStartCover(title){
  if (playerStartTitle) playerStartTitle.textContent = title || "Cargando clase...";
  if (playerStartCover) playerStartCover.classList.remove("hide");
}

function hidePlayerStartCover(){
  if (playerStartCover) playerStartCover.classList.add("hide");
}


const playerBrandCourseEl = document.getElementById("playerBrandCourse");
const playerBrandModuleEl = document.getElementById("playerBrandModule");
let brandBarsTimer = null;
let showBrandBarsOnceForModule = false;

function updateBrandBars(courseTitle, moduleTitle){
  if (playerBrandCourseEl) playerBrandCourseEl.textContent = courseTitle || "Curso";
  if (playerBrandModuleEl) playerBrandModuleEl.textContent = moduleTitle || "Cargando módulo...";
}

function showBrandBars(){
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.add("show-brand-bars");
  window.clearTimeout(brandBarsTimer);
}

function hideBrandBars(delay){
  const playerBox = document.querySelector(".player");
  window.clearTimeout(brandBarsTimer);
  brandBarsTimer = window.setTimeout(() => {
    if (playerBox) playerBox.classList.remove("show-brand-bars");
  }, typeof delay === "number" ? delay : 3000);
}


function setPlayerLoading(videoId, title){
  currentVideoId = normalizeVideoId_(videoId);
  currentModuleTitle = title || "";
  updateBrandBars(document.getElementById("courseTitle")?.textContent || "Curso", currentModuleTitle || "Cargando módulo...");
  showBrandBarsOnceForModule = true;
  showBrandBars();
  const poster = currentVideoId ? `https://i.ytimg.com/vi/${currentVideoId}/hqdefault.jpg` : "icons/icon-512.png";
  if (playerPosterImgEl) playerPosterImgEl.src = poster;
  if (playerPosterEl) playerPosterEl.classList.remove("is-ended");
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.add("is-loading");
}

function hidePlayerPoster(){
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.remove("is-loading");
  if (playerPosterEl) playerPosterEl.classList.remove("is-ended");
}

function showEndedPoster(){
  const playerBox = document.querySelector(".player");
  if (playerBox) playerBox.classList.add("is-loading");
  if (playerPosterEl) playerPosterEl.classList.add("is-ended");
}

if (playerReplayBtn){
  playerReplayBtn.addEventListener("click", () => {
    if (!currentVideoId) return;
    setPlayerLoading(currentVideoId, currentModuleTitle);
    showBrandBarsOnceForModule = true;
    showBrandBars();
    loadVideoById_(currentVideoId, true);
  });
}


function fmtTime_(sec){
  sec = Math.max(0, Math.floor(sec || 0));
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ":" + String(s).padStart(2, "0");
}

function normalizeVideoId_(value){
  if (!value) return "";
  const v = String(value).trim();
  if (/^[a-zA-Z0-9_-]{11}$/.test(v)) return v;
  const m = v.match(/(?:youtu\.be\/|v=|\/embed\/)([a-zA-Z0-9_-]{11})/);
  return m ? m[1] : "";
}

function ensureYT_(){
  if (document.getElementById("ytApiLoaded")) return;
  const s = document.createElement("script");
  s.id = "ytApiLoaded";
  s.src = "https://www.youtube.com/iframe_api";
  s.async = true;
  document.head.appendChild(s);
}

function ensureYTAndLoad_(videoId, autoplay){
  const vid = normalizeVideoId_(videoId);
  if (!vid) return;
  pendingVideoId = vid;
  pendingAutoplay = !!autoplay;
  if (YTReady){
    loadVideoById_(vid, autoplay);
    return;
  }
  ensureYT_();
}

function loadVideoById_(videoId, autoplay){
  const vid = normalizeVideoId_(videoId);
  if (!vid) return;
  if (YTReady && YTPlayer && typeof YTPlayer.loadVideoById === "function"){
    YTPlayer.loadVideoById({ videoId: vid, startSeconds: 0 });
    if (autoplay) YTPlayer.playVideo();
  } else {
    pendingVideoId = vid;
    pendingAutoplay = !!autoplay;
  }
}

function setupControls_(){
  const btn = document.getElementById("ccPlay");
  const seek = document.getElementById("ccSeek");
  const time = document.getElementById("ccTime");
  const fs = document.getElementById("ccFs");
  const wrap = document.querySelector(".player-wrap");
  let seeking = false;


  const speedBtn = document.getElementById("ccSpeedBtn");
  const speedRates = [0.5, 0.75, 1, 1.25, 1.5, 2];
  let speedIdx = 2; // 1x

  function applySpeed_(){
    if (!YTPlayer) return;
    const r = speedRates[speedIdx] || 1;
    try{ YTPlayer.setPlaybackRate(r); }catch(e){}
    if (speedBtn) speedBtn.textContent = (r % 1 === 0 ? String(r).replace('.0','') : String(r)) + "x";
  }

  if (speedBtn){
    speedBtn.addEventListener("click", () => {
      speedIdx = (speedIdx + 1) % speedRates.length;
      applySpeed_();
    });
  }

  if (btn){
    btn.addEventListener("click", () => {
      if (!YTPlayer) return;
      const st = YTPlayer.getPlayerState();
      if (st === 1) YTPlayer.pauseVideo();
      else YTPlayer.playVideo();
    });
  }

  if (seek){
    seek.addEventListener("input", () => { seeking = true; });
    seek.addEventListener("change", () => {
      if (!YTPlayer) return;
      const dur = YTPlayer.getDuration ? YTPlayer.getDuration() : 0;
      const v = Number(seek.value || 0) / 1000;
      if (dur > 0) YTPlayer.seekTo(dur * v, true);
      seeking = false;
    });
  }

  // Fullscreen propio (funciona en móvil, depende del navegador)
  async function toggleFs(){
    if (!wrap) return;
    try{
      const isFs = document.fullscreenElement || document.webkitFullscreenElement;
      if (isFs){
        if (document.exitFullscreen) await document.exitFullscreen();
        else if (document.webkitExitFullscreen) await document.webkitExitFullscreen();
      } else {
        if (wrap.requestFullscreen) await wrap.requestFullscreen();
        else if (wrap.webkitRequestFullscreen) await wrap.webkitRequestFullscreen();
      }
    }catch(e){}
  }
  if (fs) fs.addEventListener("click", toggleFs);

  // Actualiza UI
  setInterval(() => {
    if (!YTPlayer) return;
    if (seek && !seeking){
      const dur = YTPlayer.getDuration ? YTPlayer.getDuration() : 0;
      const cur = YTPlayer.getCurrentTime ? YTPlayer.getCurrentTime() : 0;
      if (dur > 0){
        seek.value = String(Math.round((cur / dur) * 1000));
        if (time) time.textContent = fmtTime_(cur) + " / " + fmtTime_(dur);
        if (currentModuleIndex >= 0){
          const now = Date.now();
          if (currentModuleIndex !== lastSavedModuleIndex || (now - lastProgressSaveAt) >= 5000){
            setCurrentTimeForModule(currentModuleIndex, cur);
            lastSavedModuleIndex = currentModuleIndex;
            lastProgressSaveAt = now;
          }
        }
      }
    }
  }, 1000);
}

// YouTube API callback
window.onYouTubeIframeAPIReady = function(){
  YTReady = true;

  YTPlayer = new YT.Player("player", {
    host: "https://www.youtube-nocookie.com",
    width: "100%",
    height: "100%",
    playerVars: {
      controls: 0,          // sin botones de YouTube (no share, no YouTube button)
      rel: 0,
      modestbranding: 1,
      iv_load_policy: 3,
      playsinline: 1,
      disablekb: 1,
      fs: 0,
      origin: location.origin
    },
    events: {
      onReady: () => {
        setupControls_();
        if (pendingVideoId){
          const autoplayPending = pendingAutoplay;
          loadVideoById_(pendingVideoId, autoplayPending);
          pendingVideoId = null;
          pendingAutoplay = false;
        }
      },
      onStateChange: (e) => {
        const btn = document.getElementById("ccPlay");
        if (btn) {
          if (e.data === 1) btn.textContent = "⏸";
          else btn.textContent = "▶";
        }

        if (e.data === 1 && currentModuleIndex >= 0) {
          hidePlayerPoster();
          hidePlayerStartCover();
          if (showBrandBarsOnceForModule) {
            hideBrandBars(3000);
            showBrandBarsOnceForModule = false;
          }
          renderProgressUI();
          if (resumePending) {
            const resume = getResumeTime(currentModuleIndex);
            if (resume > 2) {
              try { YTPlayer.seekTo(resume, true); } catch(err){}
            }
            resumePending = false;
          }
        }

        if (e.data === 3 || e.data === -1 || e.data === 5) {
          const playerBox = document.querySelector(".player");
          if (playerBox && !playerBox.classList.contains("is-loading")) {
            playerBox.classList.add("is-loading");
            if (playerPosterEl) playerPosterEl.classList.remove("is-ended");
          }
        }

        if (e.data === 2) {
          persistProgressNow();
          hidePlayerPoster();
          hidePlayerStartCover();
        }

        if (e.data === 0 && currentModuleIndex >= 0) {
          persistProgressNow();
          markModuleCompleted(currentModuleIndex);
          const nextIndex = currentModuleIndex + 1;
          if (nextIndex < courseModules.length) {
            setTimeout(() => openModuleByIndex(nextIndex, false), 700);
          } else {
            try { YTPlayer.stopVideo(); } catch(err){}
            showEndedPoster();
          }
        }
      }
    }
  });
};

<script>

function cleanEmbedUrl_(url){
  const u = String(url||"").trim();
  if(!u) return "";
  // Cambia a youtube-nocookie cuando sea embed de YouTube
  let out = u.replace("https://www.youtube.com/embed/","https://www.youtube-nocookie.com/embed/")
             .replace("http://www.youtube.com/embed/","https://www.youtube-nocookie.com/embed/")
             .replace("https://youtu.be/","https://www.youtube-nocookie.com/embed/");
  // Asegura parámetros para reducir elementos de YouTube (no se puede ocultar 100% por políticas de YouTube)
  const hasQuery = out.includes("?");
  const params = new URLSearchParams(hasQuery ? out.split("?")[1] : "");
  if(!params.has("rel")) params.set("rel","0");
  if(!params.has("modestbranding")) params.set("modestbranding","1");
  if(!params.has("iv_load_policy")) params.set("iv_load_policy","3");
  if(!params.has("playsinline")) params.set("playsinline","1");
  if(!params.has("controls")) params.set("controls","1");
  if(!params.has("fs")) params.set("fs","1");         // fullscreen on
  if(!params.has("disablekb")) params.set("disablekb","0");
  out = out.split("?")[0] + "?" + params.toString();
  return out;
}

function escapeHtml_(s){
  return String(s||"").replace(/[&<>"']/g,(c)=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]));
}

  const API_URL = "https://pasir-proxy.vercel.app/api";

  function jsonp(action, payload) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const params = new URLSearchParams();
      params.set("action", action);
      Object.entries(payload || {}).forEach(([k,v]) => {
        if (v === undefined || v === null) return;
        params.set(k, String(v));
      });
      params.set("callback", cb);

      const script = document.createElement("script");
      script.src = API_URL + "?" + params.toString();
      script.async = true;

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        try { delete window[cb]; } catch(e) { window[cb] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = () => {
        cleanup();
        reject(new Error("No se pudo conectar (JSONP)."));
      };

      document.body.appendChild(script);
    });
  }

  const token = localStorage.getItem("pasir_token");
  if (!token) location.replace("login.html");

  const params = new URLSearchParams(location.search);
  const courseId = params.get("courseId");
  const courseProgressKey = () => "pasir_progress_" + (courseId || "curso");
  let courseModules = [];
  let currentModuleIndex = -1;
  let resumePending = false;
  let lastProgressSaveAt = 0;
  let lastSavedModuleIndex = -1;

  function loadCourseProgress(){
    try { return JSON.parse(localStorage.getItem(courseProgressKey()) || "{}"); }
    catch(e){ return {}; }
  }

  function saveCourseProgress(data){
    localStorage.setItem(courseProgressKey(), JSON.stringify(data || {}));
  }
  function ensureTotalModulesSaved(total){
    const p = loadCourseProgress();
    p.totalModules = Number(total || 0);
    saveCourseProgress(p);
  }


  function markModuleCompleted(idx){
    const p = loadCourseProgress();
    if (!Array.isArray(p.completed)) p.completed = [];
    if (!p.completed.includes(idx)) p.completed.push(idx);
    p.lastIndex = idx;
    p.updatedAt = Date.now();
    saveCourseProgress(p);
    renderProgressUI();
  }

  function setLastModule(idx){
    const p = loadCourseProgress();
    p.lastIndex = idx;
    p.lastTime = 0;
    p.updatedAt = Date.now();
    saveCourseProgress(p);
    lastSavedModuleIndex = idx;
    lastProgressSaveAt = Date.now();
    renderProgressUI();
  }

  function setCurrentTimeForModule(idx, seconds){
    const p = loadCourseProgress();
    p.lastIndex = idx;
    p.lastTime = Math.max(0, Math.floor(seconds || 0));
    p.updatedAt = Date.now();
    saveCourseProgress(p);
  }

  function getResumeTime(idx){
    const p = loadCourseProgress();
    if (p.lastIndex === idx) return Math.max(0, Math.floor(p.lastTime || 0));
    return 0;
  }

  function persistProgressNow(){
    if (!YTPlayer || currentModuleIndex < 0) return;
    const cur = YTPlayer.getCurrentTime ? YTPlayer.getCurrentTime() : 0;
    setCurrentTimeForModule(currentModuleIndex, cur);
    lastSavedModuleIndex = currentModuleIndex;
    lastProgressSaveAt = Date.now();
  }

  function completedPercent(){
    const p = loadCourseProgress();
    const total = courseModules.length || 0;
    const done = Array.isArray(p.completed) ? p.completed.length : 0;
    return total ? Math.round((done / total) * 100) : 0;
  }

  function renderProgressUI(){
    const p = loadCourseProgress();
    const completed = Array.isArray(p.completed) ? p.completed : [];
    const badge = document.getElementById("courseProgressBadge");
    if (badge) badge.textContent = completedPercent() + "%";

    document.querySelectorAll("#modules .mod").forEach((btn, idx) => {
      btn.classList.remove("done","current");
      const s = btn.querySelector(".s");
      if (completed.includes(idx)) {
        btn.classList.add("done");
        if (s) {
          s.textContent = "Completada";
          s.classList.add("completed-text");
        }
      } else {
        if (s) {
          s.textContent = "Toca para reproducir";
          s.classList.remove("completed-text");
        }
      }
      if (idx === currentModuleIndex) {
        btn.classList.add("current");
        if (s && !completed.includes(idx)) s.textContent = "En reproducción";
      }
    });
  }

  function openModuleByIndex(idx, shouldResume){
    const btn = document.querySelectorAll("#modules .mod")[idx];
    if (!btn) return;
    resumePending = !!shouldResume;
    btn.click();
  }


  document.getElementById("logout").onclick = () => {
    localStorage.removeItem("pasir_token");
    location.replace("index.html");
  };

  function setActive(btn) {
    document.querySelectorAll(".mod").forEach(b => b.classList.remove("active"));
    btn.classList.add("active");
  }

  function showError(text) {
    document.getElementById("msg").textContent = text || "";
  }

  window.addEventListener("beforeunload", () => {
    try { persistProgressNow(); } catch(e) {}
  });

  (async () => {
    if (!courseId) {
      showError("Falta courseId en la URL. Ej: course.html?courseId=logo8-basico");
      return;
    }

    const r = await jsonp("course", { token, courseId });
    if (!r.ok) {
      showError(r.error || "No se pudo cargar el curso.");
      if ((r.error || "").toLowerCase().includes("no autorizado")) {
        setTimeout(()=> location.replace("account.html"), 800);
      }
      return;
    }

    document.getElementById("courseTitle").textContent = r.course.title || courseId;
    updateBrandBars(r.course.title || courseId, currentModuleTitle || "Cargando módulo...");
    showPlayerStartCover("Cargando clase...");

    const box = document.getElementById("modules");
    box.innerHTML = "";
    showError("");

        courseModules = Array.isArray(r.modules) ? r.modules : [];
    ensureTotalModulesSaved(courseModules.length);
    document.getElementById("countMods").textContent = (courseModules.length||0) + " clases";
    courseModules.forEach((m, idx) => {
      const b = document.createElement("button");
      b.className = "mod";
      b.dataset.index = idx;
      const videoId = (m.videoId) || (m.embedUrl || "").split("/embed/")[1]?.split("?")[0] || "";
      const thumb = videoId ? `https://i.ytimg.com/vi/${videoId}/hqdefault.jpg` : "icons/icon-192.png";
      b.innerHTML = `
        <div class="thumb"><img src="${thumb}" alt=""></div>
        <div class="info">
          <p class="t">${escapeHtml_(`${m.order}. ${m.title}`)}</p>
          <p class="s">Toca para reproducir</p>
        </div>
      `;
      b.onclick = () => {
        currentModuleIndex = idx;
        setActive(b);
        setLastModule(idx);
        videoLoadedFlag = true;
        showPlayerStartCover(m.title);
        setPlayerLoading(videoId, m.title);
        ensureYTAndLoad_(videoId, false);
        document.getElementById("nowPlaying").textContent = "Reproduciendo: " + m.title;
        const nt = document.getElementById("nowTitle"); if (nt) nt.textContent = m.title;
        const yt = document.getElementById("openYT");
        if (yt) yt.removeAttribute("href");
        renderProgressUI();
      };
      box.appendChild(b);
    });

    renderProgressUI();
    const saved = loadCourseProgress();
    const startIndex = (typeof saved.lastIndex === "number" && saved.lastIndex >= 0 && saved.lastIndex < courseModules.length) ? saved.lastIndex : 0;
    if (courseModules.length > 0) {
      currentModuleIndex = startIndex;
      const firstBtn = box.querySelector(`.mod[data-index="${startIndex}"]`);
      if (firstBtn) {
        setActive(firstBtn);
        firstBtn.classList.add("current");
      }
      const firstModule = courseModules[startIndex];
      if (firstModule) {
        const firstVideoId = (firstModule.videoId) || (firstModule.embedUrl || "").split("/embed/")[1]?.split("?")[0] || "";
        setPlayerLoading(firstVideoId, firstModule.title);
        document.getElementById("nowPlaying").textContent = "Listo para continuar: " + firstModule.title;
        const nt = document.getElementById("nowTitle"); if (nt) nt.textContent = firstModule.title;
      }
      renderProgressUI();
    }
  })().catch(err => {
    showError(err.message || String(err));
  });
</script>

<script>
(function(){
  const token = localStorage.getItem("pasir_token");
  const userMenu = document.getElementById("userMenu");
  const userTrigger = document.getElementById("userTrigger");
  const userDropdown = document.getElementById("userDropdown");
  const userNameEl = document.getElementById("userName");

  // Toggle dropdown
  function closeMenu(){
    if (!userDropdown) return;
    userDropdown.classList.remove("open");
    if (userTrigger) userTrigger.setAttribute("aria-expanded","false");
  }
  function openMenu(){
    if (!userDropdown) return;
    userDropdown.classList.add("open");
    if (userTrigger) userTrigger.setAttribute("aria-expanded","true");
  }
  if (userTrigger && userDropdown){
    userTrigger.addEventListener("click", (e)=>{
      e.stopPropagation();
      userDropdown.classList.contains("open") ? closeMenu() : openMenu();
    });
    document.addEventListener("click", ()=> closeMenu());
    document.addEventListener("keydown", (e)=>{ if(e.key==="Escape") closeMenu(); });
    userDropdown.addEventListener("click", (e)=> e.stopPropagation());
  }

  // Fill name (uses jsonp() already defined in this page)
  if (token && userMenu) userMenu.style.display = "inline-block";

  async function hydrateUser(){
    const storedName = localStorage.getItem("pasir_email");
    if (storedName && userNameEl) userNameEl.textContent = storedName;
    if (!token) return;
    try{
      const r = await jsonp("me", { token });
      if (!r.ok) return;
      const email = (r.user && (r.user.email || r.user.correo)) || r.email || localStorage.getItem("pasir_email") || "—";
      const label = email;

      if (userNameEl) userNameEl.textContent = label;
      localStorage.setItem("pasir_email", label);
      if (userMenu) userMenu.style.display = "inline-block";
    }catch(e){}
  }
  setTimeout(hydrateUser, 1200);

  // Logout (keep behavior: clear token and go to index)
  const logoutBtn = document.getElementById("logout");
  if (logoutBtn){
    logoutBtn.addEventListener("click", (e)=>{
      e.preventDefault();
      localStorage.removeItem("pasir_token");
      localStorage.removeItem("pasir_email");
      localStorage.removeItem("pasir_name");
      location.replace("index.html");
    });
  }
})();
</script>


<script>
/* ==== Mostrar controles propios al tocar el video (y bloquear toques al player nativo) ==== */
(function(){
  const shield = document.getElementById("tapShield");
  const wrap = document.getElementById("ccWrap");
  let hideTimer = null;

  function showControls(){
    if (!wrap || !videoLoadedFlag) return;
    wrap.classList.add("is-visible");
    if (hideTimer) clearTimeout(hideTimer);
    hideTimer = setTimeout(() => {
      wrap.classList.remove("is-visible");
    }, 3200);
  }

  // Tocar el video: solo muestra controles, NO deja interactuar con el iframe
  if (shield){
    shield.addEventListener("click", (e) => {
      e.preventDefault();
      e.stopPropagation();
      showControls();
    }, {passive:false});

    shield.addEventListener("touchstart", (e) => {
      e.preventDefault();
      e.stopPropagation();
      showControls();
    }, {passive:false});
  }

  // Si tocan el área de controles, no ocultar inmediatamente
  if (wrap){
    wrap.addEventListener("pointerdown", () => {
      if (hideTimer) clearTimeout(hideTimer);
    });
    wrap.addEventListener("pointerup", () => {
      showControls();
    });
  }

  // Exponer para otros scripts si hace falta
  window.__showCustomControls = showControls;
})();
</script>

<script id="mobile-summary-remove-fix">
(function(){
  function isPortraitMobile(){
    return window.matchMedia('(max-width: 700px) and (orientation: portrait)').matches;
  }
  function removeSummaryTextBlock(){
    if(!isPortraitMobile()) return;
    var phrases = [
      'Haz clic en una clase del panel para empezar o continuar donde te quedaste.',
      'Haz clic en una clase del panel para empezar',
      'continuar donde te quedaste'
    ];
    var nodes = Array.prototype.slice.call(document.querySelectorAll('div, section, article, aside'));
    nodes.forEach(function(el){
      var txt = (el.innerText || '').replace(/\s+/g, ' ').trim();
      if(!txt || txt.length > 220) return;
      var hasPhrase = phrases.some(function(p){ return txt.indexOf(p) !== -1; });
      if(!hasPhrase) return;
      var heading = el.querySelector('h1,h2,h3,h4,.title,.lesson-title,.session-title');
      if(heading && /sesi[oó]n\s*1/i.test((heading.textContent || '').trim())){
        el.style.display = 'none';
      }
    });
  }
  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', removeSummaryTextBlock, {once:true});
  } else {
    removeSummaryTextBlock();
  }
  window.addEventListener('resize', removeSummaryTextBlock);
})();
</script>
