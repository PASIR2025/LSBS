<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar sesión</title>
  <style>
    html.auth-checking, html.auth-checking body { visibility:hidden; }
    body{font-family:system-ui;margin:0;background: var(--bg);color: var(--text);min-height:100vh;display:grid;place-items:center}
    .card{width:min(520px,92vw);border:1px solid rgba(148,163,184,.25);border-radius:18px;background:rgba(148,163,184,.06);padding:18px}
    h1{margin:0 0 12px;font-size:1.4rem}
    label{display:block;margin:10px 0 6px;color:#cbd5e1;font-size:.95rem}
    input{width:100%;padding:12px 12px;border-radius:12px;border:1px solid rgba(148,163,184,.25);background:rgba(2,6,23,.6);color: var(--text);outline:none}
    button{width:100%;padding:12px;border-radius:12px;border:0;background:#22c55e;color:#071018;font-weight:900;cursor:pointer;margin-top:14px}
    .row{display:flex;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
    a{color:#38bdf8;text-decoration:none;font-weight:800}
    .muted{color:#9ca3af;font-size:.95rem}
    .err{margin-top:10px;color:#fca5a5;font-weight:700;white-space:pre-wrap}
  </style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" id="theme-color-meta" content="\1"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="app.css">
  <script src="theme.js" defer></script>

  <script>
    document.documentElement.classList.add("auth-checking");
    (function () {
      const token = localStorage.getItem("pasir_token");
      if (token) {
        location.replace("account.html");
        return;
      }
      document.documentElement.classList.remove("auth-checking");
    })();
  </script>
</head>
<body data-theme="light">

<header class="app-header">
  <div class="container">
    <div class="row">
      <div class="brand" role="banner">
        <span class="dot" aria-hidden="true"></span>
        <span>Pasir Academy</span>
      </div>
      <div class="nav-actions">
        <button class="btn theme-btn" id="theme-toggle" type="button" aria-label="Cambiar tema">
          <span id="theme-icon">☀️</span>
          <span id="theme-label" class="sr-only">Modo claro</span>
        </button>
      </div>
    </div>
  </div>
</header>

<main class="page"><div class="container">
<div class="card">
    <h1>Iniciar sesión</h1>
    <div class="muted">Accede para ver tus cursos habilitados.</div>

    <label>Correo</label>
    <input id="email" type="email" placeholder="tucorreo@gmail.com" autocomplete="email" />

    <label>Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" />

    <button id="btn">Entrar</button>
    <div id="msg" class="err" style="display:none"></div>

    <div class="row">
      <span class="muted">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></span>
      <a href="index.html">Volver</a>
    </div>
  </div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycby7goi8hJ06WF9up9NhPPXJn7a7z0dxrpzo-q37lNoAj9Ai07p5rMl7yGNliOYsdmlc/exec";

  function jsonp(action, payload) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const params = new URLSearchParams();
      params.set("action", action);
      Object.entries(payload || {}).forEach(([k,v]) => {
        if (v === undefined || v === null) return;
        params.set(k, String(v));
      });
      params.set("callback", cb);

      const script = document.createElement("script");
      script.src = API_URL + "?" + params.toString();
      script.async = true;

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        try { delete window[cb]; } catch(e) { window[cb] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = () => {
        cleanup();
        reject(new Error("No se pudo conectar (JSONP/CORS)."));
      };

      document.body.appendChild(script);
    });
  }

  function showErr(text) {
    const el = document.getElementById("msg");
    el.style.display = "block";
    el.textContent = text;
  }

  document.getElementById("btn").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass").value;

    if (!email || !password) return showErr("Completa correo y contraseña.");

    try {
      const r = await jsonp("login", { email, password });
      if (!r.ok) return showErr(r.error || "Error de login");

      localStorage.setItem("pasir_token", r.token);
      localStorage.setItem("pasir_email", email);

      try {
        const me = await jsonp("me", { token: r.token });
        const nm = (me.user && (me.user.name || me.user.nombre)) || me.name || "";
        if (nm) localStorage.setItem("pasir_name", nm);
        const em = (me.user && (me.user.email || me.user.correo)) || me.email || "";
        if (em) localStorage.setItem("pasir_email", em);
      } catch(e) {}

      location.replace("account.html");
    } catch (e) {
      showErr(e.message);
    }
  };
</script>

<script>
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>

</div></main>
</body>
</html>
