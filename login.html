<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Iniciar sesión</title>
  <style>
    body{font-family:system-ui;margin:0;min-height:100vh;display:grid;place-items:center;background:var(--bg);color:var(--text)}
    .card{width:min(520px,92vw);border:1px solid var(--stroke);border-radius:18px;background:var(--panel2);padding:18px;box-shadow:var(--shadow)}
    h1{margin:0 0 12px;font-size:1.4rem}
    label{display:block;margin:10px 0 6px;color:var(--muted);font-size:.95rem}
    input{width:100%;padding:12px 12px;border-radius:12px;border:1px solid var(--stroke);background:var(--panel);color:var(--text);outline:none}
    button{width:100%;padding:12px;border-radius:12px;border:0;background:#22c55e;color:#071018;font-weight:900;cursor:pointer;margin-top:14px}
    .row{display:flex;justify-content:space-between;gap:10px;margin-top:12px;flex-wrap:wrap}
    a{color:#38bdf8;text-decoration:none;font-weight:800}
    .muted{color:var(--muted);font-size:.95rem}
    .err{margin-top:10px;color:#fca5a5;font-weight:700;white-space:pre-wrap}
  

/* ===== Tema global (igual que index) ===== */
:root{
  color-scheme: dark light;
  --bg:#f3f4f6;
  --panel:#ffffff;
  --panel2: rgba(148,163,184,.10);
  --stroke: rgba(148,163,184,.25);
  --text:#0f172a;
  --muted:#6b7280;
  --shadow: 0 12px 28px rgba(15,23,42,0.10);
  --pill: 999px;
  --r: 18px;
  --t: .18s ease-out;
}
body[data-theme="dark"]{
  --bg:#0b1220;
  --panel: rgba(15,23,42,0.96);
  --panel2: rgba(255,255,255,.06);
  --stroke: rgba(148,163,184,.22);
  --text:#f9fafb;
  --muted: rgba(255,255,255,.70);
  --shadow: 0 18px 45px rgba(15,23,42,0.85);
}
body{
  background: var(--bg);
  color: var(--text);
}
a{color:inherit}

/* Botón tema compacto */
.theme-btn{
  width:38px; height:38px;
  border-radius: var(--pill);
  border:1px solid var(--stroke);
  background: var(--panel2);
  cursor:pointer;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
  font-size:1.05rem;
  transition: transform var(--t), border-color var(--t);
}
.theme-btn:hover{transform: translateY(-1px); border-color: rgba(56,189,248,.60);}
.sr-only{
  position:absolute;width:1px;height:1px;padding:0;margin:-1px;overflow:hidden;
  clip:rect(0,0,0,0);white-space:nowrap;border:0;
}

</style>

  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" id="theme-color-meta" content="\1"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body data-theme="light">
  <div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;gap:10px;"><div></div>
<button class="theme-btn" id="theme-toggle" type="button" aria-label="Cambiar tema">
  <span id="theme-icon">☀️</span>
  <span id="theme-label" class="sr-only">Modo claro</span>
</button>
</div>
<h1>Iniciar sesión</h1>
    <div class="muted">Accede para ver tus cursos habilitados.</div>

    <label>Correo</label>
    <input id="email" type="email" placeholder="tucorreo@gmail.com" autocomplete="email" />

    <label>Contraseña</label>
    <input id="pass" type="password" placeholder="••••••••" autocomplete="current-password" />

    <button id="btn">Entrar</button>
    <div id="msg" class="err" style="display:none"></div>

    <div class="row">
      <span class="muted">¿No tienes cuenta? <a href="register.html">Crear cuenta</a></span>
      <a href="index.html">Volver</a>
    </div>
  </div>

<script>

  const API_URL = "https://pasir-proxy.vercel.app/api";

  function jsonp(action, payload) {
    return new Promise((resolve, reject) => {
      const cb = "cb_" + Math.random().toString(36).slice(2);
      const params = new URLSearchParams();
      params.set("action", action);
      Object.entries(payload || {}).forEach(([k,v]) => {
        if (v === undefined || v === null) return;
        params.set(k, String(v));
      });
      params.set("callback", cb);

      const script = document.createElement("script");
      script.src = API_URL + "?" + params.toString();
      script.async = true;

      window[cb] = (data) => {
        cleanup();
        resolve(data);
      };

      function cleanup() {
        try { delete window[cb]; } catch(e) { window[cb] = undefined; }
        if (script.parentNode) script.parentNode.removeChild(script);
      }

      script.onerror = () => {
        cleanup();
        reject(new Error("No se pudo conectar (JSONP/CORS)."));
      };

      document.body.appendChild(script);
    });
  }


  function showErr(text) {
    const el = document.getElementById("msg");
    el.style.display = "block";
    el.textContent = text;
  }

  document.getElementById("btn").onclick = async () => {
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("pass").value;

    if (!email || !password) return showErr("Completa correo y contraseña.");

    try {
      const r = await jsonp("login", { email, password });
      if (!r.ok) return showErr(r.error || "Error de login");

      sessionStorage.setItem("pasir_token", r.token);
      sessionStorage.setItem("pasir_email", email);

      // Intentar obtener nombre y guardarlo (para menú)
      try {
        const me = await jsonp("me", { token: r.token });
        const nm = (me.user && (me.user.name || me.user.nombre)) || me.name || "";
        if (nm) sessionStorage.setItem("pasir_name", nm);
        const em = (me.user && (me.user.email || me.user.correo)) || me.email || "";
        if (em) sessionStorage.setItem("pasir_email", em);
      } catch(e) {}

      location.href = "account.html";
    } catch (e) {
      showErr(e.message);
    }
  };
</script>

  <script>
  // PWA: registrar Service Worker
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => {
      navigator.serviceWorker.register("./sw.js").catch(() => {});
    });
  }
</script>

<script>
  // ===== Tema global (igual que index) =====
  (function(){
    const themeMeta = document.getElementById("theme-color-meta");
    const btn = document.getElementById("theme-toggle");
    const icon = document.getElementById("theme-icon");
    const label = document.getElementById("theme-label");

    function setTheme(theme){
      document.body.setAttribute("data-theme", theme);
      const dark = theme === "dark";
      if (icon) icon.textContent = dark ? "🌙" : "☀️";
      if (label) label.textContent = dark ? "Modo oscuro" : "Modo claro";
      if (themeMeta) themeMeta.setAttribute("content", dark ? "#0b1220" : "#f3f4f6");
      localStorage.setItem("pasir-theme", theme);
    }

    const saved = localStorage.getItem("pasir-theme");
    setTheme(saved === "dark" ? "dark" : "light");

    if (btn){
      btn.addEventListener("click", () => {
        const current = document.body.getAttribute("data-theme");
        setTheme(current === "dark" ? "light" : "dark");
      });
    }
  })();
</script>

</body>
</html>
